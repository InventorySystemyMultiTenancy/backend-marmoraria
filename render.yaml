services:
  - type: web
    name: marmoraria-backend
    env: node
    plan: starter
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        fromDatabase:
          name: marmoraria-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COMPANY_NAME
        value: Marmoraria Pedras Pedroza
      - key: COMPANY_WHATSAPP
        value: "5511981220661"

databases:
  - name: marmoraria-db
    databaseName: marmoraria
    user: marmoraria_user
    plan: starter
